spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/sanosysalvos

  cloud:
    gateway:
      routes:
        - id: bff-route
          uri: lb://bff
          predicates:
            - Path=/bff/**
          filters:
            - name: CircuitBreaker
              args:
                name: gateway-bff
                fallbackUri: forward:/fallback/bff

        - id: mascotas-route
          uri: lb://msvc-mascotas
          predicates:
            - Path=/api/mascotas/**
          filters:
            - name: CircuitBreaker
              args:
                name: gateway-mascotas
                fallbackUri: forward:/fallback/mascotas

        - id: usuarios-route
          uri: lb://msvc-usuarios
          predicates:
            - Path=/api/usuarios/**
          filters:
            - name: CircuitBreaker
              args:
                name: gateway-usuarios
                fallbackUri: forward:/fallback/usuarios

        - id: reportes-route
          uri: lb://msvc-reportes
          predicates:
            - Path=/api/reportes/**
          filters:
            - name: CircuitBreaker
              args:
                name: gateway-reportes
                fallbackUri: forward:/fallback/reportes

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "http://localhost:5173"
            allowed-methods: GET,POST,PUT,DELETE,OPTIONS
            allowed-headers: "*"
            allow-credentials: true

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

# ── Resilience4j Circuit Breaker (Gateway) ───────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      gateway-bff:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      gateway-mascotas:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      gateway-usuarios:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      gateway-reportes:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s