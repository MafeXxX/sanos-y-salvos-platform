spring.application.name=bff
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=*
spring.boot.admin.client.url=http://localhost:8085

# ── Resilience4j Circuit Breaker ─────────────────────────────────────────────
resilience4j.circuitbreaker.instances.bff.sliding-window-size=10
resilience4j.circuitbreaker.instances.bff.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bff.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bff.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.bff.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.bff.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.bff.max-attempts=3
resilience4j.retry.instances.bff.wait-duration=500ms

# ── Feign + Resilience4j ─────────────────────────────────────────────────────
spring.cloud.openfeign.circuitbreaker.enabled=true
